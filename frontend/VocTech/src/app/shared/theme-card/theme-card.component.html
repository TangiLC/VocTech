<mat-card class="theme-card">
  <mat-card-header [ngStyle]="{ 'background-color': titleBackground }">
    <mat-card-title >
      {{ title }}</mat-card-title>
  </mat-card-header>
  <mat-card-content [ngStyle]="{ 'background-color': contentBackground }">
    <p>{{ content }}</p>
  </mat-card-content>
  <app-word-search-input></app-word-search-input>
</mat-card>
